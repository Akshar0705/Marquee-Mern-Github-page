<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 250px 1fr 1fr;
            grid-template-rows: 80px 250px 250px 80px;
            gap: 10px;
            width: 900px;
        }

        .cell {
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .header {
            grid-column: 1/4;
            grid-row: 1;
            background: linear-gradient(135deg, #f97316, #ef4444);
        }

        .sidebar {
            grid-column: 1;
            grid-row: 2/4;
            background: linear-gradient(180deg, #6366f1, #4f46e5);
        }

        .content1 {
            grid-column: 2/4;
            grid-row: 2;
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .content2 {
            grid-column: 2;
            grid-row: 3;
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .content3 {
            grid-column: 3;
            grid-row: 3;
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        .footer {
            grid-column: 1/4;
            grid-row: 4;
            background: linear-gradient(135deg, #06b6d4, #0284c7);
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="cell header">My Dashboard</div>
        <div class="cell sidebar">Navigation Menu</div>
        <div class="cell content1">Sales Report</div>
        <div class="cell content2">Recent Tasks</div>
        <div class="cell content3">Team Members</div>
        <div class="cell footer">Contact Support</div>
    </div>
</body>

</html>
